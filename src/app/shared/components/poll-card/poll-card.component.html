<a class="poll-card" [routerLink]="['/poll', poll.id]">
  <div class="poll-card__top">
    <span class="poll-card__category">{{ poll.category }}</span>

    @if (isActive) {
      <span class="poll-card__status active">Aktiv</span>
    } @else {
      <span class="poll-card__status closed">Beendet</span>
    }
  </div>

  <h3>{{ poll.title }}</h3>

  <p>{{ poll.description }}</p>

  <div class="poll-card__footer">
    <span>{{ poll.options.length }} Optionen</span>
    <span>{{ totalVotes }} Stimmen</span>
  </div>
</a>
