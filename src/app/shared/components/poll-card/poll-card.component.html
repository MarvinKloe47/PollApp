<a class="poll-card" [routerLink]="['/poll', poll.id]">
  <p class="poll-card__category">{{ poll.category }}</p>

  <h3>{{ poll.title }}</h3>

  @if (poll.description) {
    <p>{{ poll.description }}</p>
  }

  <footer class="poll-card__footer">
    @if (isActive) {
      <span class="poll-card__deadline-badge">Ends soon</span>
    } @else {
      <span class="poll-card__deadline-badge">Closed</span>
    }
  </footer>
</a>
