<a class="poll-card" [routerLink]="['/poll', poll.id]">
  <div class="poll-card__header">
    <span class="poll-card__category">{{ poll.category }}</span>

    @if (isActive) {
      <span class="poll-card__badge">Active</span>
    } @else {
      <span class="poll-card__badge poll-card__badge--closed">Closed</span>
    }
  </div>

  <h3>{{ poll.title }}</h3>

  <p>{{ poll.description }}</p>

  <div class="poll-card__footer">
    <span>{{ poll.options.length }} options</span>
    <span>{{ totalVotes }} votes</span>
  </div>
</a>
