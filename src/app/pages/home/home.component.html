<section class="home">
  <section class="hero">
    <div class="hero__content">
      <h1>Empower your decisions</h1>

      <p>
        Create surveys, collect votes and make decisions faster with your team.
      </p>

      <a routerLink="/create" class="hero__button">
        Create survey
      </a>
    </div>

    <div class="hero__visual">
      <img src="tablet.png" alt="Survey preview" />
    </div>
  </section>

  <section class="surveys">
    <div class="surveys__header">
      <h2>Your surveys</h2>
    </div>

    @if (loading) {
      <p class="surveys__state">Loading surveys...</p>
    }

    @if (error) {
      <p class="surveys__state surveys__state--error">{{ error }}</p>
    }

    @if (!loading) {
      <div class="poll-grid">
        @for (poll of activePolls; track poll.id) {
          <app-poll-card [poll]="poll"></app-poll-card>
        }
      </div>
    }
  </section>
</section>
